<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>NPC Translator</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NPC Translator">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&amp;family=Noto+Sans+Hebrew:wght@400;700&amp;display=swap" rel="stylesheet">
  <!-- Librerie (alcune caricate lazy) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
  <!-- Librerie per esportazione (caricate staticamente ma con fallback dinamico) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- docx verrà caricato dinamicamente se necessario -->
  <style>
    :root {
      --primary: #a855f7;
      --primary-glow: rgba(168, 85, 247, 0.5);
      --secondary: #7c3aed;
      --bg-dark: #0a0a0f;
      --bg-surface: #12121a;
      --bg-surface-light: #1e1e2a;
      --text: #e0e0ff;
      --text-dim: #a0a0cc;
      --border: #2a2a3a;
      --error: #f87171;
      --success: #4ade80;
      --gradient: linear-gradient(135deg, #7c3aed, #a855f7, #d946ef);
      --gradient-glow: 0 0 20px rgba(168, 85, 247, 0.3);
    }
    .light-theme {
      --bg-dark: #f0f0ff;
      --bg-surface: #ffffff;
      --bg-surface-light: #f0f0fa;
      --text: #1a1a2a;
      --text-dim: #4a4a6a;
      --border: #d0d0e0;
    }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 var(--primary-glow); } 70% { box-shadow: 0 0 0 10px rgba(168,85,247,0); } 100% { box-shadow: 0 0 0 0 rgba(168,85,247,0); } }
    @keyframes glow { from { text-shadow:0 0 10px var(--primary),0 0 20px var(--primary); } to { text-shadow:0 0 15px var(--primary),0 0 30px var(--secondary); } }
    body {
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      padding: 0.75rem 1rem;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    main { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }
    h1 {
      text-align: center; color: white; font-size: 2.6rem; margin-bottom: 0.8rem;
      font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
      animation: glow 3s ease-in-out infinite alternate;
      position: relative; display: inline-block; left: 50%; transform: translateX(-50%);
      white-space: nowrap;
    }
    h1::before {
      content: 'NPC Translator'; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      color: var(--primary); opacity: 0.3; filter: blur(8px); z-index: -1;
    }
    h1 i { color: var(--primary); margin: 0 0.5rem; font-size: 3rem; animation: float 3s ease-in-out infinite; }
    .language-selector {
      display: flex; 
      gap: 0.3rem; 
      justify-content: flex-start; 
      align-items: center; 
      flex-wrap: wrap;           /* Permette di andare a capo se necessario */
      margin-bottom: 0.4rem;
      background: var(--bg-surface); 
      padding: 0.4rem 0.55rem; 
      border-radius: 22px; 
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* View controls (tema) nella barra lingue */
    .view-controls {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      margin-left: 0.5rem;
      padding-left: 0.5rem;
      border-left: 1px solid var(--border);
    }

    .view-controls button {
      background: var(--bg-surface-light);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.15s ease;
      position: relative;
    }

    .view-controls button:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Drop zone compatto quando è nella riga delle lingue */
    .language-selector .drop-zone {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.3rem 0.55rem;
      margin: 0 0.15rem;
      border-radius: 16px;
      font-size: 0.75rem;
      white-space: nowrap;
      border-width: 1px;
      cursor: pointer;
      background: var(--bg-surface-light);
    }

    .language-selector .drop-zone i {
      font-size: 0.95rem;
      margin-bottom: 0;
      color: var(--primary);
    }

    .language-selector .drop-zone span {
      font-size: 0.72rem;
    }

    .language-selector .drop-zone .file-info {
      display: none;
    }
    select {
      background: var(--bg-surface-light); color: var(--text); border: 1px solid var(--border); padding: 0.8rem 2rem;
      border-radius: 30px; font-size: 1rem; cursor: pointer; min-width: 180px; appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23a855f7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat; background-position: right 1rem center; transition: all 0.3s ease;
    }
    select:hover { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
    #swap {
      width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--secondary), var(--primary));
      border: none; color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease; animation: pulse 2s infinite; box-shadow: 0 0 20px var(--primary-glow);
    }
    #swap:hover { transform: rotate(180deg) scale(1.1); }
    #themeToggle {
      background: var(--bg-surface-light); border: 1px solid var(--border); color: var(--text);
      padding: 0.8rem 1.2rem; border-radius: 30px; font-size: 1rem; cursor: pointer;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 0.6rem; }

    .side-panels {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.8rem;
      flex-wrap: wrap;
    }
    .panel {
      flex: 1;
      min-width: 240px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 0.7rem;
      transition: border-color 0.2s ease;
    }

    .panel:hover {
      border-color: var(--primary);
    }

    .panel h3 {
      margin: 0 0 0.35rem;
      font-size: 0.88rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .panel-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 0.12rem 0.4rem;
      border-radius: 5px;
      font-size: 0.7rem;
      cursor: pointer;
      margin-left: 0.15rem;
      float: right;
      transition: all 0.15s ease;
    }

    .panel-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .panel-list {
      max-height: 155px;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-surface-light);
      font-size: 0.8rem;
    }
    .textarea-wrapper { position: relative; display: flex; flex-direction: column; }
    textarea {
      min-height: 320px; background: var(--bg-surface); border: 1px solid var(--border); color: var(--text);
      padding: 0.9rem; border-radius: 14px; font-size: 0.95rem; line-height: 1.5; resize: vertical; transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      width: 100%; box-sizing: border-box;
    }
    textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 30px var(--primary-glow); transform: translateY(-2px); }
    textarea::placeholder { color: var(--text-dim); opacity: 0.5; }

    /* Pulsanti sotto le textarea - coerenti con il design generale */
    .textarea-actions {
      gap: 0.35rem;
      margin-top: 0.3rem;
    }
    .textarea-actions button {
      padding: 0.3rem 0.65rem;
      font-size: 0.78rem;
      border-radius: 6px;
      background: var(--bg-surface-light);
      border: 1px solid var(--border);
      color: var(--text);
      transition: all 0.15s ease;
    }
    .textarea-actions button:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      transform: translateY(-1px);
    }
    .textarea-actions button i {
      font-size: 0.85rem;
      margin-right: 0.2rem;
    }
    #output { background: linear-gradient(135deg, var(--bg-surface), #1a1a2a); }
    .light-theme #output { background: linear-gradient(135deg, #ffffff, #f0f0ff); }
    .char-counter { text-align: right; font-size: 0.8rem; color: var(--text-dim); margin-top: 0.2rem; margin-right: 0.5rem; }
    .warning { color: #fbbf24; font-size: 0.85rem; margin-top: 0.2rem; text-align: right; }

    /* ============================================
       NUOVA ARCHITETTURA LAYOUT (Post pulizia)
       ============================================ */

    /* Azioni principali nella barra superiore - solo icone */
    .top-actions {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      margin-left: 0.25rem;
      padding-left: 0.3rem;
      border-left: 1px solid var(--border);
    }

    .top-actions > button,
    .top-actions .dropdown-btn {
      padding: 0.5rem 0.7rem;
      font-size: 1.15rem;
      border-radius: 6px;
      background: var(--bg-surface-light);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      min-width: 38px;
      min-height: 38px;
      position: relative;
    }

    .top-actions > button:hover,
    .top-actions .dropdown-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Tooltip personalizzati per pulsanti icona */
    .top-actions button[title]:hover::after,
    .top-actions .dropdown-btn[title]:hover::after,
    .view-controls button[title]:hover::after,
    #immersiveToggle[title]:hover::after {
      content: attr(title);
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2a;
      color: #fff;
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 9999;
      pointer-events: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    /* Stile base pulsanti - più compatto e moderno */
    button {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      border: none;
      color: white;
      padding: 0.55rem 1rem;
      border-radius: 6px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s ease;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--primary-glow); }
    button i { font-size: 1.2rem; }
    #clear { background: var(--bg-surface-light); box-shadow: none; border: 1px solid var(--border); }
    #clear:hover { background: var(--error); border-color: var(--error); }
    #abort { background: #444; }
    #voiceBtn, #ocrBtn, #speakBtn, #copy, #stopSpeakBtn {
      background: var(--bg-surface-light); border: 1px solid var(--border); color: var(--text);
      padding: 0.5rem 1rem; font-size: 0.9rem;
    }
    #voiceBtn:hover, #ocrBtn:hover, #speakBtn:hover, #copy:hover, #stopSpeakBtn:hover {
      background: var(--primary); color: white;
    }
    .drop-zone {
      border: 2px dashed var(--primary);
      background: var(--bg-surface-light);
      padding: 0.7rem; text-align: center; border-radius: 12px; cursor: pointer; margin: 0.4rem 0; transition: all 0.3s ease;
    }
    .drop-zone:hover {
      border-color: var(--secondary);
      background: var(--bg-surface);
      transform: scale(1.02); box-shadow: 0 0 40px var(--primary-glow);
    }
    .drop-zone i { font-size: 1.8rem; color: var(--primary); margin-bottom: 0.4rem; display: block; }
    .drop-zone span { font-size: 0.9rem; color: var(--text-dim); }
    #progress { height: 8px; background: var(--bg-surface-light); border-radius: 10px; overflow: hidden; margin: 2rem 0 1rem; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
    #bar {
      height: 100%; width: 0%; background: linear-gradient(90deg, var(--secondary), var(--primary), #d946ef);
      background-size: 200% 200%; animation: gradientMove 2s ease infinite; border-radius: 10px;
      box-shadow: 0 0 20px var(--primary); transition: width 0.4s ease;
    }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .status {
      text-align: center; color: var(--text-dim); font-size: 1rem; padding: 1rem;
      border-radius: 30px; background: var(--bg-surface); border: 1px solid var(--border);
      margin-top: 1rem;
    }
    .status i { color: var(--primary); margin-right: 0.5rem; }

    .offline-banner {
      text-align: center;
      background: #3f2a1f;
      color: #fbbf24;
      border: 1px solid #854d0e;
      padding: 0.6rem 1rem;
      border-radius: 12px;
      margin: 0 auto 1rem;
      max-width: 720px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .light-theme .offline-banner {
      background: #fef3c7;
      color: #854d0e;
      border-color: #fcd34d;
    }
    .file-info { margin-top: 1rem; padding: 0.8rem; background: var(--bg-surface-light); border-radius: 20px; font-size: 0.9rem; color: var(--text-dim); display: inline-block; }
    /* Pannelli laterali - design moderno e compatto */
    .panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.75rem;
    }

    .panel h3 {
      margin: 0 0 0.35rem;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    #historyList, #glossaryList {
      max-height: 170px;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-surface-light);
      font-size: 0.82rem;
    }

    #historyList li, #glossaryList li {
      padding: 0.38rem 0.55rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.15s ease, color 0.15s ease;
    }

    #historyList li:hover, #glossaryList li:hover {
      background: var(--primary);
      color: white;
    }

    #historyList li:last-child,
    #glossaryList li:last-child {
      border-bottom: none;
    }
    /* Controlli e impostazioni - più compatti */
    .checkbox-group {
      display: flex;
      gap: 0.4rem;
      justify-content: flex-start;
      margin: 0.25rem 0;
      flex-wrap: wrap;
      align-items: center;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      cursor: pointer;
      font-size: 0.82rem;
    }

    #voiceSelect {
      background: var(--bg-surface-light);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      min-width: 140px;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
    }

    .slider-group input {
      width: 70px;
    }

    #stats {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-left: 0.5rem;
    }
    #historySearch { background: var(--bg-surface-light); border: 1px solid var(--border); color: var(--text); border-radius: 20px; padding: 0.3rem 1rem; width: 100%; margin-bottom: 0.5rem; }
    dialog { background: var(--bg-surface); color: var(--text); border: 1px solid var(--primary); border-radius: 20px; padding: 1.5rem; max-width: 400px; }
    dialog::backdrop { background: rgba(0,0,0,0.7); }
    .glossary-edit input { width: 100%; margin-bottom: 0.5rem; background: var(--bg-surface-light); border: 1px solid var(--border); color: var(--text); padding: 0.5rem; border-radius: 8px; }
    .immersive-mode .language-selector > :not(#immersiveToggle), 
    .immersive-mode .action-bar, 
    .immersive-mode .drop-zone, 
    .immersive-mode #progress, 
    .immersive-mode .status, 
    .immersive-mode .side-panels { 
      display: none !important; 
    }

    /* Collassa la barra lingua in immersive (solo il pulsante schermo resta, posizionato fixed) */
    .immersive-mode .language-selector {
      height: 0 !important;
      min-height: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
      overflow: visible;
    }

    /* Stile base del pulsante Immersive (sempre visibile) */
    #immersiveToggle {
      background: var(--bg-surface-light);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-left: 0.25rem;
    }

    #immersiveToggle:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* In modalità immersiva diventa floating e più visibile */
    .immersive-mode #immersiveToggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 99999;
      background: var(--bg-surface);
      border: 1px solid var(--primary);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      color: var(--primary);
    }

    .immersive-mode #immersiveToggle {
      display: inline-flex !important;
      position: fixed !important;
      top: 12px;
      right: 12px;
      z-index: 99999;
      background: var(--bg-surface);
      border: 1px solid var(--primary);
      padding: 0.5rem 0.7rem;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      font-size: 1.2rem;
      margin-left: 0;
      color: var(--primary);
    }
    .immersive-mode .grid { grid-template-columns: 1fr; }
    .immersive-mode main { max-width: 800px; }
    #autoSaveIndicator { font-size: 0.7rem; color: var(--text-dim); margin-left: 0.5rem; }
    .dropdown {
      position: relative;
      display: inline-block;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background: var(--bg-surface);
      min-width: 180px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 12px;
      z-index: 50;
      bottom: 100%;
      left: 0;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .dropdown.open .dropdown-content {
      display: block;
    }
    .dropdown-content button {
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      color: var(--text);
      padding: 0.4rem 0.8rem;
      border-radius: 0;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .dropdown-content button:hover {
      background: var(--primary);
      color: white;
    }
    .dropdown-content button:active {
      background: var(--secondary);
    }
    .caret { font-size: 0.7em; margin-left: 0.2rem; }

    /* MEDIA QUERY PER MOBILE (OTTIMIZZATE) */
    @media (max-width: 768px) {
      body { padding: 0.5rem 0.6rem; }
      h1 { font-size: 2rem; white-space: normal; margin-bottom: 0.4rem; }
      h1 i { font-size: 1.7rem; }
      .language-selector {
        flex-direction: column;
        align-items: stretch;
        padding: 0.5rem;
        border-radius: 20px;
        gap: 0.4rem;
        margin-bottom: 0.5rem;
      }

      .view-controls {
        margin-left: 0;
        width: 100%;
        justify-content: flex-end;
        margin-top: 0.3rem;
        gap: 0.3rem;
      }
      .view-controls button {
        padding: 0.3rem 0.5rem;
        font-size: 0.9rem;
        position: relative;
      }
      .language-selector select {
        min-width: auto;
        width: 100%;
        padding: 0.8rem 1.5rem;
        font-size: 0.9rem;
      }
      #swap {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
        align-self: center;
      }
      .grid { grid-template-columns: 1fr; gap: 0.5rem; }
      textarea { min-height: 240px; padding: 0.6rem; font-size: 0.9rem; }
      .top-actions {
        margin-left: 0;
        padding-left: 0.25rem;
        border-left: none;
        width: 100%;
        flex-wrap: wrap;
        gap: 0.25rem;

<script type="module">
  import * as pdfjs from 'pdfjs-dist';
  pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

  /**
   * NPC Translator — Serious Development Mode
   *
   * Current Priorities (1-2-3-4, no bilingual output):
   * 1. Architecture & Cleanup (solid foundations)
   * 2. Chapter detection + per-chapter translation
   * 3. Dialogue formatting preservation
   * 4. Export quality improvements (EPUB, DOCX, PDF, TXT)
   *
   * Design principles:
   * - Stay as close as possible to single-file for ease of use
   * - Clear code organization and comments
   * - Focus on narrative books and dialogue-heavy content
   */

  // ============================================
  // 1. CONFIG & STATE
  // ============================================
  const CONFIG = {
    version: '0.5.0-serious',
    defaultChunkSize: 1800,
  };

  let state = {
    currentBook: null,           // { title, chapters: [...] }
    isTranslating: false,
    currentLangPair: { from: 'auto', to: 'it' },
  };

  // ============================================

  // ============================================

  // Main language controls

  const to = document.getElementById('to');
  const swapBtn = document.getElementById('swap');

  // Main action buttons (new clean structure)

  const clearBtn = document.getElementById('clear');
  const batchBtn = document.getElementById('batchBtn');

  // Export
  const exportDropdown = document.getElementById('exportDropdown');
  const downloadBtn = document.getElementById('downloadBtn');

  // View controls
  const themeToggle = document.getElementById('themeToggle');
  const immersiveToggle = document.getElementById('immersiveToggle');

  // Input side small buttons
  const voiceBtn = document.getElementById('voiceBtn');
  const ocrBtn = document.getElementById('ocrBtn');
  const pasteBtn = document.getElementById('pasteBtn');
  const speakInputBtn = document.getElementById('speakInputBtn');
  const stopSpeakInputBtn = document.getElementById('stopSpeakInputBtn');
  const clearInputBtn = document.getElementById('clearInputBtn');

  // Output side small buttons

  const copyBtn = document.getElementById('copy');

  // Counters & warnings

  // Settings

  const preserveFormatting = document.getElementById('preserveFormatting');
  const bookMode = document.getElementById('bookMode');

  // Glossary (missing declarations - caused ReferenceError)

  const exportGlossaryBtn = document.getElementById('exportGlossary');

  // (All DOM references centralized cleanly above. Duplicate block removed.)

  let autoSaveTimer = null;
  let tesseractLoaded = false;

  // ---------- FUNZIONE PER CARICARE SCRIPT DINAMICAMENTE ----------
  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = src;
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  // =====================================================
  // GENERATORE DOCX NATIVO (senza dipendenze esterne)
  // Usa JSZip (già caricato) per creare un .docx valido
  // =====================================================
  async function createDocxBlob(text, meta) {
    const zip = new JSZip();
    const escapeXml = (str) => str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&apos;');

    const paragraphs = splitIntoParagraphs(text);

    // 1. [Content_Types].xml
    zip.file("[Content_Types].xml", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
</Types>`);

    // 2. _rels/.rels
    zip.file("_rels/.rels", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`);

    // 3. word/_rels/document.xml.rels
    zip.file("word/_rels/document.xml.rels", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`);

    // 4. word/styles.xml (base)
    zip.file("word/styles.xml", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:docDefaults>
    <w:rPrDefault><w:rPr><w:rFonts w:ascii="Calibri" w:hAnsi="Calibri" w:eastAsia="Calibri" w:cs="Calibri"/></w:rPr></w:rPrDefault>
  </w:docDefaults>
</w:styles>`);

    // 5. word/document.xml (contenuto principale)
    let bodyXml = '';

    // Titolo
    bodyXml += `<w:p>
      <w:pPr><w:jc w:val="center"/></w:pPr>
      <w:r><w:rPr><w:b/><w:sz w:val="32"/><w:color w:val="6D28D9"/></w:rPr><w:t>${escapeXml(meta.title)}</w:t></w:r>
    </w:p>`;

    // Meta
    bodyXml += `<w:p>
      <w:pPr><w:jc w:val="center"/></w:pPr>
      <w:r><w:rPr><w:i/><w:sz w:val="20"/><w:color w:val="666666"/></w:rPr>
      <w:t>${escapeXml(meta.from)} → ${escapeXml(meta.to)}  •  ${escapeXml(meta.date)}</w:t></w:r>
    </w:p>`;

    bodyXml += `<w:p><w:pPr><w:spacing w:after="200"/></w:pPr></w:p>`;

    // Paragrafi di contenuto
    paragraphs.forEach(para => {
      bodyXml += `<w:p>
        <w:pPr><w:spacing w:after="160"/></w:pPr>
        <w:r><w:t xml:space="preserve">${escapeXml(para)}</w:t></w:r>
      </w:p>`;
    });

    // Nota finale
    bodyXml += `<w:p><w:pPr><w:spacing w:before="300"/></w:pPr></w:p>`;
    bodyXml += `<w:p>
      <w:pPr><w:jc w:val="center"/></w:pPr>
      <w:r><w:rPr><w:i/><w:sz w:val="18"/><w:color w:val="888888"/></w:rPr>
      <w:t>— Fine traduzione NPC —</w:t></w:r>
    </w:p>`;

    const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:body>
    ${bodyXml}
    <w:sectPr>
      <w:pgSz w:w="11906" w:h="16838"/>
      <w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134"/>
    </w:sectPr>
  </w:body>
</w:document>`;

    zip.file("word/document.xml", documentXml);

    // Genera il blob
    return await zip.generateAsync({ type: "blob" });
  }

  // ---------- PREFERENZE E TEMA ----------
  function loadPrefs() {
    try {
      if (localStorage.getItem('npc_from')) from.value = localStorage.getItem('npc_from');
      if (localStorage.getItem('npc_to')) to.value = localStorage.getItem('npc_to');
      if (localStorage.getItem('npc_theme') === 'light') {
        document.body.classList.add('light-theme');
      } else if (localStorage.getItem('npc_theme') === 'dark') {
        document.body.classList.remove('light-theme');
      } else {
        if (window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.body.classList.add('light-theme');
        }
      }
      if (localStorage.getItem('npc_live') === 'true') liveTranslate.checked = true;
      if (localStorage.getItem('npc_autoFile') === 'true') autoFileTranslate.checked = true;
      if (localStorage.getItem('npc_preserve') === 'true') preserveFormatting.checked = true;
      if (localStorage.getItem('npc_bookMode') === 'true') bookMode.checked = true;
      if (localStorage.getItem('npc_rate')) rateSlider.value = localStorage.getItem('npc_rate');
      if (localStorage.getItem('npc_pitch')) pitchSlider.value = localStorage.getItem('npc_pitch');
    } catch (e) {}
  }
  function saveLangPrefs() {
    try {
      localStorage.setItem('npc_from', from.value);
      localStorage.setItem('npc_to', to.value);
    } catch (e) {}
  }
  loadPrefs();

  // ---------- OFFLINE DETECTION ----------
  const offlineBanner = document.getElementById('offlineBanner');
  function updateOnlineStatus() {
    const isOffline = !navigator.onLine;
    if (offlineBanner) {
      offlineBanner.style.display = isOffline ? 'flex' : 'none';
    }
    if (translateBtn) {
      if (isOffline) {
        translateBtn.style.opacity = '0.6';
        translateBtn.title = 'Connessione richiesta per la traduzione';
      } else {
        translateBtn.style.opacity = '';
        translateBtn.title = '';
      }
    }
  }

    const lang = (to.value || 'out').replace(/[^a-z0-9]/gi, '');

    return `traduzione_npc_${lang}_${stamp}.${ext}`;

  // ========== ESTRAZIONE CAPITOLI EPUB (per Progetti Libro) ==========
  async function parseEpubChapters(arrayBuffer) {
    try {
      const zip = await JSZip.loadAsync(arrayBuffer);
      const chapters = [];

      for (const [filename, zipEntry] of Object.entries(zip.files)) {
        if (!filename.match(/\.(xhtml|html|htm)$/i) || zipEntry.dir) continue;

        try {
          const content = await zipEntry.async('string');
          const parser = new DOMParser();
          const doc = parser.parseFromString(content, 'text/html');

          // Rimuovi elementi non di contenuto
          doc.querySelectorAll('nav, script, style, header, footer, [role="doc-toc"], [role="navigation"], .toc').forEach(el => el.remove());

          // Prova a trovare un titolo significativo (migliorato per Priority 2)
          let title = '';
          const h1 = doc.querySelector('h1, h2, h3');
          if (h1 && h1.textContent.trim().length > 2 && h1.textContent.trim().length < 120) {
            title = h1.textContent.trim();
          } else {
            const titleEl = doc.querySelector('title');
            if (titleEl && titleEl.textContent.trim().length > 2 && titleEl.textContent.trim().length < 100) {
              title = titleEl.textContent.trim();
            } else {
              // Fallback dal filename
              const base = filename.split('/').pop().replace(/\.(xhtml|html|htm)$/i, '');
              title = base
                .replace(/chapter|capitolo|parte|part|ch|cap|section|sezione/gi, '')
                .replace(/[_-]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
              if (!title || title.length < 3) title = `Sezione ${chapters.length + 1}`;
            }
          }

          const bodyText = (doc.body?.textContent || '').trim();
          if (bodyText.length > 30) {
            chapters.push({
              id: chapters.length,
              title: title.substring(0, 120),
              original: bodyText,
              translated: '',
              status: 'pending'
            });
          }
        } catch (e) {
          console.warn('Errore parsing capitolo EPUB:', filename, e);
        }
      }

      return chapters;
    } catch (e) {
      console.error('Errore parseEpubChapters:', e);
      return [];
    }
  }

  // ========== GESTIONE PROGETTO LIBRO (Priority 2 - in sviluppo) ==========

  downloadPdf.onclick = () => {
    if (!output.value.trim()) { setStatus("❌ Nessun testo", true); return; }
    if (typeof jspdf === 'undefined' && typeof window.jspdf === 'undefined') {
      setStatus("❌ Libreria PDF non caricata", true); return;
    }
    const meta = getExportMeta();
    const paragraphs = splitIntoParagraphs(output.value);
    const isRTL = ['yi', 'he', 'ar'].includes(to.value);

    const { jsPDF } = window.jspdf || window;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const pageWidth = doc.internal.pageSize.getWidth();
    const pageHeight = doc.internal.pageSize.getHeight();
    const margin = 18;
    const maxWidth = pageWidth - margin * 2;
    const lineHeight = 6.5;
    const paraSpacing = 4;
    let y = margin + 12;

    // Header block
    doc.setFontSize(14);
    doc.setTextColor(100, 60, 180);
    doc.text(meta.title, margin, margin + 2);

    doc.setFontSize(10);
    doc.setTextColor(90);
    doc.text(`Da: ${meta.from}   →   A: ${meta.to}    |    ${meta.date}`, margin, margin + 8);

    doc.setDrawColor(160, 85, 247);
    doc.setLineWidth(0.5);
    doc.line(margin, margin + 11, pageWidth - margin, margin + 11);

    // Content
    doc.setFontSize(11);
    doc.setTextColor(20);

    paragraphs.forEach((para, idx) => {
      const lines = doc.splitTextToSize(para, maxWidth);
      for (let i = 0; i < lines.length; i++) {
        if (y + lineHeight > pageHeight - margin - 12) {
          doc.addPage();
          y = margin + 12;
        }
        // Basic RTL note: jsPDF default is LTR; full RTL needs extra libs
        doc.text(lines[i], margin, y);
        y += lineHeight;
      }
      y += paraSpacing;
      if (idx < paragraphs.length - 1 && y > pageHeight - margin - 20) {
        doc.addPage();
        y = margin + 12;
      }
    });

    // Footer
    const pageCount = doc.internal.getNumberOfPages();
    for (let p = 1; p <= pageCount; p++) {
      doc.setPage(p);
      doc.setFontSize(8);
      doc.setTextColor(130);
      doc.text(`NPC Translator • ${meta.pair} • Pagina ${p} / ${pageCount}`, pageWidth / 2, pageHeight - 8, { align: 'center' });
    }

    const filename = generateSmartFilename('pdf', meta);
    doc.save(filename);
    setStatus("✅ File PDF scaricato");
  };

  // ---------- TRADUZIONE ----------
  async function translateWithServer(text, sourceLang, targetLang) {
    const sl = sourceLang === 'auto' ? 'auto' : (['yi', 'he'].includes(sourceLang) ? 'he' : sourceLang);
    const tl = ['yi', 'he'].includes(targetLang) ? 'he' : targetLang;
    const timeout = (ms) => new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), ms));
    const servers = [
      async () => {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
        const res = await Promise.race([fetch(url), timeout(5000)]);
        const data = await res.json();
        return data[0].map(x => x[0]).join('');
      },
      async () => {
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sl}|${tl}`;
        const res = await Promise.race([fetch(url), timeout(5000)]);
        const data = await res.json();
        return data.responseData.translatedText;
      },
      async () => {
        const url = `https://lingva.ml/api/v1/${sl}/${tl}/${encodeURIComponent(text)}`;
        const res = await Promise.race([fetch(url), timeout(5000)]);
        const data = await res.json();
        return data.translation;
      }
    ];
    for (const server of servers) {
      try { return await server(); } catch (e) { /* fallback */ }
    }
    throw new Error('Nessun server disponibile');
  }

  // ---------- LOGICA DI TRADUZIONE (con supporto Modalità Libro) ----------
  function chunkForTranslation(text, useBookMode) {
    if (!useBookMode) {
      // Modalità classica (veloce)
      const MAX = 1600;
      const parts = [];
      for (let i = 0; i < text.length; i += MAX) {
        parts.push(text.slice(i, i + MAX));
      }
      return parts;
    }

    // Modalità Libro: suddivide per paragrafi e raggruppa intelligentemente
    const paragraphs = text.trim().split(/\n\s*\n+/).filter(p => p.trim().length > 0);
    const chunks = [];
    let currentChunk = '';
    const MAX_CHUNK = 2200;           // un po' più grande ma più sicuro
    const MIN_CHUNK = 800;

    for (let i = 0; i < paragraphs.length; i++) {
      const para = paragraphs[i].trim();
      const potential = currentChunk ? currentChunk + '\n\n' + para : para;

      if (potential.length > MAX_CHUNK && currentChunk.length > MIN_CHUNK) {
        chunks.push(currentChunk);
        currentChunk = para;
      } else {
        currentChunk = potential;
      }
    }

    if (currentChunk) chunks.push(currentChunk);

    return chunks.length > 0 ? chunks : [text];
  }

  async function translateText(text) {
    const useBookMode = bookMode && bookMode.checked;
    const parts = chunkForTranslation(text, useBookMode);

    let result = '';
    let previousContext = '';   // contesto da passare alla chiamata successiva

    for (let i = 0; i < parts.length; i++) {
      if (abortTranslation) throw new Error('Annullato');

      setStatus(`Traduzione ${i + 1}/${parts.length}${useBookMode ? ' (Modalità Libro)' : ''}`);
      bar.style.width = ((i + 1) / parts.length * 100) + "%";

      let textToSend = parts[i];

      // In Modalità Libro passiamo un po' di contesto
      if (useBookMode && previousContext) {
        textToSend = `Contesto precedente (da mantenere coerente):\n"${previousContext}"\n\nTraduci il testo seguente mantenendo nomi, stile e tono:\n\n${parts[i]}`;
      }

      const translated = await translateWithServer(textToSend, from.value, to.value);
      result += (i > 0 ? '\n\n' : '') + translated;

      // Prepariamo contesto per il prossimo chunk (ultime 1-2 frasi)
      if (useBookMode) {
        const sentences = translated.split(/[.!?。！？]\s+/);
        previousContext = sentences.slice(-2).join('. ').slice(-280);
      }

      if (i < parts.length - 1 && !abortTranslation) {
        await new Promise(r => setTimeout(r, useBookMode ? 650 : 400));
      }
    }

    return result;
  }

  // ---------- GESTIONE FILE ----------
  async function readFile(file) {
    const name = file.name.toLowerCase();
    try {
      if (name.endsWith('.txt')) {
        return await file.text();
      }
      if (name.endsWith('.pdf')) {
        const arrayBuffer = await file.arrayBuffer();
        const loadingTask = pdfjs.getDocument({ data: arrayBuffer });
        loadingTask.onPassword = (updatePassword, reason) => {
          if (reason === 1) {
            const password = prompt('Il PDF è protetto da password. Inserisci la password:');
            if (password !== null) updatePassword(password);
          }
        };
        const pdf = await loadingTask.promise;
        let text = "";
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          let lastY = null;
          let pageText = "";
          for (const item of content.items) {
            if (lastY !== null && Math.abs(item.transform[5] - lastY) > 5) {
              pageText += "\n";
            }
            pageText += item.str;
            lastY = item.transform[5];
          }
          text += pageText + "\n\n";
        }
        return text;
      }
      if (name.endsWith('.docx')) {
        const arrayBuffer = await file.arrayBuffer();
        if (preserveFormatting.checked) {
          const result = await mammoth.convertToHtml({ arrayBuffer });
          let html = result.value;
          html = html.replace(/<strong>(.*?)<\/strong>/g, '**$1**')
                     .replace(/<b>(.*?)<\/b>/g, '**$1**')
                     .replace(/<em>(.*?)<\/em>/g, '*$1*')
                     .replace(/<i>(.*?)<\/i>/g, '*$1*')
                     .replace(/<p>/g, '\n\n')
                     .replace(/<\/p>/g, '')
                     .replace(/<br\s*\/?>/g, '\n');
          html = html.replace(/<[^>]*>/g, '');
          return html;
        } else {
          const result = await mammoth.extractRawText({ arrayBuffer });
          return result.value;
        }
      }
      if (name.endsWith('.epub')) {
        const arrayBuffer = await file.arrayBuffer();

        // Se siamo in Modalità Libro, proviamo a estrarre capitoli strutturati
        if (bookMode && bookMode.checked) {
          const chapters = await parseEpubChapters(arrayBuffer);
          if (chapters.length > 0) {
            // Restituiamo un formato speciale che il gestore di progetto può riconoscere
            return { __type: 'book-chapters', chapters, filename: file.name };
          }
        }

        // Fallback: estrazione classica (testo piatto)
        const zip = await JSZip.loadAsync(arrayBuffer);
        let fullText = '';
        let count = 0;
        for (const [filename, zipEntry] of Object.entries(zip.files)) {
          if (filename.match(/\.(xhtml|html|htm)$/i) && !zipEntry.dir) {
            try {
              const content = await zipEntry.async('string');
              const parser = new DOMParser();
              const doc = parser.parseFromString(content, 'text/html');
              doc.querySelectorAll('nav, script, style, header, footer, [role="doc-toc"], [role="navigation"]').forEach(el => el.remove());
              const bodyText = doc.body?.textContent || '';
              if (bodyText.trim().length > 0) {
                fullText += `\n\n--- ${filename} ---\n${bodyText.trim()}\n`;
                count++;
              }
            } catch (e) {
              console.warn(`Errore parsing ${filename}:`, e);
            }
          }
        }
        if (fullText.trim()) {
          return fullText.trim() + `\n\n[Estratti ${count} file HTML]`;
        }
        return '[EPUB: nessun testo leggibile]';
      }
      if (file.type.startsWith('image/')) {
        setStatus(`OCR su ${file.name}...`);
        if (!tesseractLoaded) await loadTesseract();
        const lang = from.value === 'auto' ? 'ita+eng' : from.value;
        const { data: { text } } = await Tesseract.recognize(file, lang);
        return text;
      }
      throw new Error('Formato non supportato');
    } catch (err) {
      throw new Error(`Errore lettura ${file.name}: ${err.message}`);
    }
  }

  async function processEntries(entries) {
    const files = [];
    for (const entry of entries) {
      if (entry.isFile) {
        const file = await new Promise(resolve => entry.file(resolve));
        files.push(file);
      } else if (entry.isDirectory) {
        const dirReader = entry.createReader();
        const subEntries = await new Promise(resolve => dirReader.readEntries(resolve));
        const subFiles = await processEntries(subEntries);
        files.push(...subFiles);
      }
    }
    return files;
  }

  async function handleFiles(files) {
    if (!files || files.length === 0) return;
    fileInfo.textContent = `📂 Caricamento ${files.length} file...`;
    let successCount = 0;
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      try {
        setStatus(`Lettura ${file.name} (${i+1}/${files.length})...`);
        bar.style.width = ((i+1) / files.length * 100) + "%";
        const result = await readFile(file);

        // Supporto per Progetti Libro (EPUB strutturato)
        if (result && result.__type === 'book-chapters') {
          await loadBookProject(result.chapters, result.filename || file.name);
          successCount++;
          fileInfo.textContent = `✅ Progetto Libro caricato: ${file.name}`;
          return; // non continuare con il flusso normale
        }

        const text = typeof result === 'string' ? result : String(result);
        input.value += (input.value ? "\n\n" : "") + `[${file.name}]\n${text}`;
        successCount++;
        fileInfo.textContent = `✅ ${file.name} caricato`;
      } catch (err) {
        fileInfo.textContent = `❌ Errore: ${err.message}`;
        setStatus(`Errore: ${err.message}`, true);
      }
    }
    bar.style.width = "0%";
    setStatus(`✅ ${successCount}/${files.length} file caricati`);
    updateCounters();
    if (autoFileTranslate.checked && input.value.trim()) {
      translateBtn.click();
    }
  }

    e.preventDefault();
    const items = e.dataTransfer.items;
    if (items) {
      const entries = [];
      for (let i = 0; i < items.length; i++) {
        const entry = items[i].webkitGetAsEntry();
        if (entry) entries.push(entry);
      }
      const files = await processEntries(entries);
      handleFiles(files);
    } else {
      handleFiles(e.dataTransfer.files);
    }
  };
  drop.ondragover = (e) => e.preventDefault();
  fileInput.onchange = (e) => handleFiles(e.target.files);

  // ---------- BATCH PARALLELO ----------
  async function parallelBatch(files, concurrency = 2) {
    const results = [];
    const chunks = [];
    for (let i = 0; i < files.length; i += concurrency) {
      chunks.push(files.slice(i, i + concurrency));
    }
    for (let i = 0; i < chunks.length; i++) {
      setStatus(`Batch: gruppo ${i+1}/${chunks.length}...`);
      const chunkResults = await Promise.all(chunks[i].map(async (file) => {
        try {
          const text = await readFile(file);
          const translated = await translateText(text);
          return { file, translated, error: null };
        } catch (err) {
          return { file, translated: null, error: err.message };
        }
      }));
      results.push(...chunkResults);
      bar.style.width = ((i+1) / chunks.length * 100) + '%';
    }
    return results;
  }

  batchBtn.onclick = () => {
    const inputFile = document.createElement('input');
    inputFile.type = 'file';
    inputFile.accept = '.pdf,.epub,.txt,.docx,image/*';
    inputFile.multiple = true;
    inputFile.onchange = async (e) => {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;
      setStatus(`Batch: traduzione di ${files.length} file...`);
      const zip = new JSZip();
      const results = await parallelBatch(files, 2);
      for (const { file, translated, error } of results) {
        if (translated) {
          zip.file(`tradotto_${file.name}.txt`, translated);
        } else {
          zip.file(`ERRORE_${file.name}.txt`, `Errore: ${error}`);
        }
      }
      setStatus("Generazione ZIP...");

      const blob = await zip.generateAsync({ type: 'blob' });
      const suggestedName = `traduzioni_batch_${new Date().toISOString().slice(0,10)}.zip`;

      // Prova a far scegliere all'utente dove salvare il file (Save As)
      if (window.showSaveFilePicker) {
        try {
          const fileHandle = await window.showSaveFilePicker({
            suggestedName: suggestedName,
            types: [{
              description: 'File ZIP',
              accept: { 'application/zip': ['.zip'] }
            }]
          });
          const writable = await fileHandle.createWritable();
          await writable.write(blob);
          await writable.close();
          setStatus("✅ Batch completato e salvato");
        } catch (err) {
          if (err.name !== 'AbortError') {
            // Se l'utente non ha annullato, fallback al download normale
            downloadBlob(blob, suggestedName);
            setStatus("✅ Batch completato (download automatico)");
          } else {
            setStatus("Batch annullato dall'utente");
          }
        }
      } else {
        // Fallback per browser che non supportano showSaveFilePicker
        downloadBlob(blob, suggestedName);
        setStatus("✅ Batch completato");
      }
      bar.style.width = "0%";
      if (Notification.permission === 'granted') {
        new Notification('Batch completato', { body: `Tradotti ${files.length} file.` });
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission();
      }
    };
    inputFile.click();
  };

  // ---------- STATISTICHE ----------

  // ---------- CRONOLOGIA ----------
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('NPCTranslator', 3);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('history')) db.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
        if (!db.objectStoreNames.contains('glossary')) {
          const store = db.createObjectStore('glossary', { keyPath: 'id', autoIncrement: true });
          store.createIndex('term', 'term', { unique: false });
        }
        if (!db.objectStoreNames.contains('projects')) {
          const store = db.createObjectStore('projects', { keyPath: 'id' });
          store.createIndex('updated', 'updated', { unique: false });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function saveToHistory(original, translated) {
    const db = await openDB();
    const tx = db.transaction('history', 'readwrite');
    tx.objectStore('history').add({ original, translated, date: new Date() });
    tx.oncomplete = () => loadHistory();
  }

  async function loadHistory() {
    const db = await openDB();
    const tx = db.transaction('history', 'readonly');
    const store = tx.objectStore('history');
    const all = await new Promise((res) => { const req = store.getAll(); req.onsuccess = () => res(req.result); });
    const searchTerm = (historySearch.value || '').toLowerCase();
    const filtered = all.filter(item =>
      (item.original || '').toLowerCase().includes(searchTerm) ||
      (item.translated || '').toLowerCase().includes(searchTerm)
    );
    const frag = document.createDocumentFragment();
    filtered.reverse().slice(0, 20).forEach(item => {
      const li = document.createElement('li');
      li.dataset.id = item.id;
      li.style.cssText = 'cursor:pointer; border-bottom:1px solid var(--border); padding:0.5rem;';
      const orig = (item.original || '').substring(0, 30);
      const trans = (item.translated || '').substring(0, 30);
      li.textContent = `${orig}… → ${trans}…`;
      frag.appendChild(li);
    });
    historyList.innerHTML = '';
    historyList.appendChild(frag);
  }

  // ---------- GLOSSARIO ----------
  async function loadGlossary() {
    const db = await openDB();
    const tx = db.transaction('glossary', 'readonly');
    const store = tx.objectStore('glossary');
    const all = await new Promise((res) => { const req = store.getAll(); req.onsuccess = () => res(req.result); });
    glossaryList.innerHTML = all.map(item => {
      const typeLabel = item.matchType === 'phrase' ? '📝' : '🔤';
      return `<li style="border-bottom:1px solid var(--border); padding:0.3rem;">
        ${typeLabel} <strong>${item.term}</strong> → ${item.translation}
        <button class="delGloss" data-id="${item.id}">❌</button>
        <button class="editGloss" data-id="${item.id}">✏️</button>
      </li>`;
    }).join('');
    document.querySelectorAll('.delGloss').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        const id = Number(btn.dataset.id);
        const db = await openDB();
        const tx = db.transaction('glossary', 'readwrite');
        tx.objectStore('glossary').delete(id);
        tx.oncomplete = () => loadGlossary();
      };
    });
    document.querySelectorAll('.editGloss').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        const id = Number(btn.dataset.id);
        openGlossaryEdit(id);
      };
    });
  }

  async function openGlossaryEdit(id = null) {
    const db = await openDB();
    let item = null;
    if (id) {
      const tx = db.transaction('glossary', 'readonly');
      item = await new Promise((res) => { const req = tx.objectStore('glossary').get(id); req.onsuccess = () => res(req.result); });
    }
    const container = document.getElementById('glossaryEditContainer');
    const currentType = item?.matchType || (item?.term?.includes(' ') ? 'phrase' : 'word');

    container.innerHTML = `
      <input type="text" id="glossTerm" placeholder="Termine o frase (es. 'Lord of Winterfell')" value="${item ? item.term : ''}">
      <input type="text" id="glossTranslation" placeholder="Traduzione" value="${item ? item.translation : ''}">
      <div style="display:flex; gap:8px; margin:6px 0;">
        <label style="font-size:0.85rem; display:flex; align-items:center; gap:4px;">
          <input type="radio" name="glossType" value="word" ${currentType === 'word' ? 'checked' : ''}> Parola
        </label>
        <label style="font-size:0.85rem; display:flex; align-items:center; gap:4px;">
          <input type="radio" name="glossType" value="phrase" ${currentType === 'phrase' ? 'checked' : ''}> Frase intera
        </label>
      </div>
      <input type="text" id="glossTargetLang" placeholder="Lingua (es. it)" value="${item ? item.targetLang : to.value}">
      <button id="saveGloss">Salva</button>
      <div style="font-size:0.7rem; color:var(--text-dim); margin-top:4px;">
        Per libri: usa "Frase intera" per nomi di personaggi e luoghi lunghi.
      </div>
    `;
    glossaryDialog.showModal();
    document.getElementById('saveGloss').onclick = async () => {
      const term = document.getElementById('glossTerm').value.trim();
      const translation = document.getElementById('glossTranslation').value.trim();
      const targetLang = document.getElementById('glossTargetLang').value.trim();
      const matchTypeEl = container.querySelector('input[name="glossType"]:checked');
      const matchType = matchTypeEl ? matchTypeEl.value : (term.includes(' ') ? 'phrase' : 'word');

      if (!term || !translation || !targetLang) return;

      const db = await openDB();
      const tx = db.transaction('glossary', 'readwrite');
      const data = { term, translation, targetLang, matchType };

      if (id) {
        tx.objectStore('glossary').put({ id, ...data });
      } else {
        tx.objectStore('glossary').add(data);
      }
      tx.oncomplete = () => {
        loadGlossary();
        glossaryDialog.close();
      };
    };
  }

  addGlossaryBtn.onclick = () => openGlossaryEdit();

  closeGlossaryDialog.onclick = () => glossaryDialog.close();

  exportGlossaryBtn.onclick = async () => {
    const db = await openDB();
    const tx = db.transaction('glossary', 'readonly');
    const store = tx.objectStore('glossary');
    const all = await new Promise((res) => { const req = store.getAll(); req.onsuccess = () => res(req.result); });
    const blob = new Blob([JSON.stringify(all)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'npc_glossary.json';
    a.click();
  };

  importGlossaryBtn.onclick = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      const data = JSON.parse(text);
      const db = await openDB();
      const tx = db.transaction('glossary', 'readwrite');
      for (const item of data) {
        delete item.id;
        tx.objectStore('glossary').add(item);
      }
      tx.oncomplete = () => loadGlossary();
    };
    input.click();
  };

  // ========== GLOSSARIO AVANZATO ==========
  async function applyGlossary(text, targetLang) {
    const db = await openDB();
    const tx = db.transaction('glossary', 'readonly');
    const store = tx.objectStore('glossary');
    const all = await new Promise((res) => { const req = store.getAll(); req.onsuccess = () => res(req.result); });

    // Filtra per lingua e ordina per lunghezza decrescente (frasi lunghe prima)
    const entries = all
      .filter(e => e.targetLang === targetLang)
      .sort((a, b) => (b.term?.length || 0) - (a.term?.length || 0));

    let result = text;

    for (const entry of entries) {
      if (!entry.term || !entry.translation) continue;

      const term = entry.term.trim();
      if (!term) continue;

      try {
        // Escape per regex
        const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

        // Prova prima con regex Unicode (migliore per accenti)
        const regex = new RegExp('(^|[^\\p{L}\\p{N}])(' + escaped + ')(?=$|[^\\p{L}\\p{N}])', 'giu');

        result = result.replace(regex, (match, prefix, matchedTerm) => {
          const replacement = entry.translation;
          if (matchedTerm[0] === matchedTerm[0].toUpperCase() && matchedTerm.length > 1) {
            return prefix + replacement.charAt(0).toUpperCase() + replacement.slice(1);
          }
          return prefix + replacement;
        });
      } catch (e) {
        // Fallback per browser molto vecchi
        const regex = new RegExp('\\b' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
        result = result.replace(regex, entry.translation);
      }
    }

    return result;
  }

  // ---------- SCORCIATOIE ----------
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); translateBtn.click(); }
    if (e.ctrlKey && e.shiftKey && e.key === 'C') { e.preventDefault(); copyBtn.click(); }
    if (e.key === 'Escape' && isTranslating) abortBtn.click();
  });

  // ---------- AVVIO ----------
  to.addEventListener('change', () => { checkRTL(); saveLangPrefs(); });
  from.addEventListener('change', saveLangPrefs);
  liveTranslate.addEventListener('change', () => localStorage.setItem('npc_live', liveTranslate.checked));
  autoFileTranslate.addEventListener('change', () => localStorage.setItem('npc_autoFile', autoFileTranslate.checked));
  checkRTL();
  loadHistory();
  loadGlossary();
  updateStats();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              if (confirm('Nuova versione disponibile. Ricaricare?')) {
                window.location.reload();
              }
            }
          });
        });
      }).catch(e => console.log('SW non registrato', e));
    });
  }

  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
</script>
