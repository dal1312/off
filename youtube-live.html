<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f0f17"><title>YouTube Live Translator</title><style>:root{--p:#a855f7;--s:#7c3aed;--bg:#0a0a0f;--c:#12121a;--c2:#1e1e2a;--t:#e0e0ff;--d:#a0a0cc;--ok:#4ade80;--er:#f87171;--b:#2a2a3a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:Inter,system-ui,sans-serif;padding:18px}.app{max-width:1200px;margin:auto}.head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.controls,.grid{display:grid;gap:12px}.controls{grid-template-columns:repeat(4,1fr);margin:18px 0}.grid{grid-template-columns:1fr 1fr}input,select,button,textarea{font:inherit;border:1px solid var(--b);border-radius:10px;padding:10px;background:var(--c2);color:var(--t)}button{background:linear-gradient(135deg,var(--s),var(--p));font-weight:700;cursor:pointer}.card,.status{background:var(--c);border:1px solid var(--b);border-radius:14px;padding:14px}textarea{width:100%;min-height:320px;resize:vertical}.status{margin-top:12px;color:var(--d)}.ok{color:var(--ok)}.err{color:var(--er)}.backend{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:12px}.back{color:#d8b4fe;text-decoration:none}@media(max-width:800px){.controls,.grid{grid-template-columns:1fr 1fr}}@media(max-width:520px){.controls,.grid,.backend{grid-template-columns:1fr}}</style></head><body><main class="app"><div class="head"><div><a class="back" href="./index.html">← NPC Translator</a><h1>🎧 YouTube Live Translator v2</h1></div><b id="badge">● Inattivo</b></div><div class="backend"><input id="backend" placeholder="URL backend es. https://tuo-backend.example.com"><button id="health">Test backend</button></div><section class="controls"><select id="source"><option value="auto">Auto lingua</option><option value="it">Italiano</option><option value="en">English</option><option value="es">Español</option><option value="fr">Français</option><option value="de">Deutsch</option></select><select id="target"><option value="it">→ Italiano</option><option value="en">→ English</option><option value="es">→ Español</option><option value="fr">→ Français</option><option value="de">→ Deutsch</option></select><button id="start">▶ Avvia</button><button id="stop" disabled>■ Stop</button></section><section class="grid"><div class="card"><h2>Trascrizione live</h2><textarea id="transcript" readonly></textarea></div><div class="card"><h2>Traduzione live</h2><textarea id="translation" readonly></textarea></div></section><div id="status" class="status">Configura URL backend, poi avvia e seleziona la scheda YouTube con audio.</div></main><script>
const $=x=>document.getElementById(x);let stream,rec,running=false,busy=false;const CHUNK_MS=5000;function status(t,c=''){const e=$('status');e.textContent=t;e.className='status '+c}function base(){return $('backend').value.trim().replace(/\/$/,'')}function save(){localStorage.setItem('npcLiveBackend',base())}$('backend').value=localStorage.getItem('npcLiveBackend')||'';
$('health').onclick=async()=>{try{save();const r=await fetch(base()+'/health');if(!r.ok)throw Error('HTTP '+r.status);status('Backend online ✓','ok')}catch(e){status('Backend non raggiungibile: '+e.message,'err')}};
async function sendChunk(blob){if(busy||!running||blob.size<1000)return;busy=true;try{const fd=new FormData();fd.append('audio',blob,'chunk.webm');const u=base()+'/api/live-chunk?source='+encodeURIComponent($('source').value)+'&target='+encodeURIComponent($('target').value);const r=await fetch(u,{method:'POST',body:fd});const d=await r.json();if(!r.ok)throw Error(d.message||d.error||'HTTP '+r.status);if(d.text)$('transcript').value+=($('transcript').value?'\n':'')+d.text;if(d.translation)$('translation').value+=($('translation').value?'\n':'')+d.translation;status('LIVE · chunk elaborato','ok')}catch(e){status('Errore pipeline: '+e.message,'err')}finally{busy=false}}
function startRecorder(){const audio=new MediaStream(stream.getAudioTracks());const mime=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';rec=new MediaRecorder(audio,{mimeType:mime});rec.ondataavailable=e=>sendChunk(e.data);rec.start(CHUNK_MS)}
$('start').onclick=async()=>{try{if(!base())throw Error('Inserisci URL backend');save();stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});if(!stream.getAudioTracks().length)throw Error('Attiva Condividi audio scheda');running=true;$('start').disabled=true;$('stop').disabled=false;$('badge').textContent='● LIVE';$('badge').style.color='#4ade80';stream.getTracks().forEach(t=>t.addEventListener('ended',stop));startRecorder();status('LIVE · invio chunk ogni 5 secondi','ok')}catch(e){if(stream)stream.getTracks().forEach(t=>t.stop());status(e.message,'err')}};
function stop(){running=false;if(rec&&rec.state!=='inactive')rec.stop();if(stream)stream.getTracks().forEach(t=>t.stop());rec=null;stream=null;$('start').disabled=false;$('stop').disabled=true;$('badge').textContent='● Inattivo';$('badge').style.color='';status('Sessione terminata')}$('stop').onclick=stop;
</script></body></html>
